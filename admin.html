<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHER LOCKED AGAIN?! — Control Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Special+Elite&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/old-london" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">

  <div class="paper-texture"></div>
  <div class="vignette"></div>

  <header class="admin-header">
    <div class="header-left">
      <span class="logo-sm">SHER LOCKED</span>
      <span class="header-sep">|</span>
      <span class="admin-badge">⚙ INSPECTOR'S CONTROL ROOM</span>
    </div>
    <div class="header-right">
      <span class="live-indicator"></span>
      <span id="liveTeamCount">0 teams</span>
      <button id="resetGameBtn" style="background:none;border:1px solid rgba(139,26,26,0.6);color:rgba(242,232,213,0.7);font-family:var(--font-type);font-size:0.58rem;letter-spacing:0.12em;padding:0.3rem 0.8rem;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(139,26,26,0.4)';this.style.color='#f2e8d5'" onmouseout="this.style.background='none';this.style.color='rgba(242,232,213,0.7)'">⚠ RESET GAME</button>
    </div>
  </header>

  <!-- TAB NAV -->
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="clues">📁 CLUES</button>
    <button class="admin-tab" data-tab="teams">👥 TEAMS</button>
    <button class="admin-tab" data-tab="rounds">🔐 ROUNDS</button>
  </div>

  <!-- TAB: CLUES -->
  <div class="admin-tab-content active" id="tab-clues">
    <div class="admin-layout">

      <!-- LEFT: Add clue -->
      <div class="admin-left">
        <div class="admin-card">
          <div class="admin-card-title">＋ NEW CLUE</div>
          <label class="field-label">TITLE</label>
          <input type="text" id="clueTitle" class="admin-input" placeholder="e.g. Suspect's Diary Entry"/>

          <label class="field-label" style="margin-top:0.8rem;">DESCRIPTION</label>
          <textarea id="clueDesc" class="admin-textarea" rows="4" placeholder="Describe the clue..."></textarea>

          <div class="two-col" style="margin-top:0.8rem">
            <div>
              <label class="field-label">ROUND</label>
              <select id="clueRound" class="round-select">
                <option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option>
              </select>
            </div>
            <div>
              <label class="field-label">IMAGE / AUDIO <span style="color:var(--ink-faint);font-size:0.55rem">(free upload)</span></label>
              <input type="file" id="clueMedia" class="admin-file" accept="image/*,audio/*" style="margin-top:0.3rem"/>
              <div id="uploadProgress" class="hidden" style="margin-top:0.4rem;font-family:var(--font-type);font-size:0.6rem;color:var(--ink-faint);">⏳ Uploading...</div>
            </div>
          </div>

          <button id="addClueBtn" class="admin-btn pink" style="margin-top:1rem">SAVE CLUE (DRAFT)</button>
          <div id="addClueMsg" class="submit-msg hidden"></div>
        </div>
      </div>

      <!-- CENTER: All clues -->
      <div class="admin-center">
        <div class="section-title">
          <span class="section-icon">📁</span> ALL CLUES
          <span class="clue-count" id="adminClueCount">0</span>
        </div>
        <div id="adminClueList" class="admin-clue-list">
          <div class="empty-state" id="adminEmpty">
            <div class="empty-icon">📋</div>
            <div>No clues yet.</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- TAB: TEAMS -->
  <div class="admin-tab-content" id="tab-teams">
    <div class="teams-panel">
      <div class="section-title">
        <span class="section-icon">👥</span> REGISTERED TEAMS
        <span class="clue-count" id="teamsCount">0</span>
      </div>
      <div id="teamsList" class="teams-list">
        <div class="empty-sub-note">No teams registered yet.</div>
      </div>
    </div>
  </div>

  <!-- TAB: ROUNDS -->
  <div class="admin-tab-content" id="tab-rounds">
    <div class="rounds-panel">
      <div class="section-title">
        <span class="section-icon">🔐</span> ROUND CONTROLS
      </div>
      <div id="roundControlsList" class="round-controls-list"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, query, orderBy,
      onSnapshot, addDoc, updateDoc, doc, serverTimestamp,
      setDoc, getDoc, getDocs, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── RESET GAME ──
    document.getElementById("resetGameBtn").addEventListener("click", async () => {
      const confirmed = confirm("⚠ RESET GAME?\n\nThis will permanently delete ALL teams, clues, and rounds. This cannot be undone.\n\nType OK to confirm.");
      if (!confirmed) return;

      const btn = document.getElementById("resetGameBtn");
      btn.textContent = "RESETTING...";
      btn.disabled = true;

      try {
        // Delete all collections in parallel
        const deleteCollection = async (colName) => {
          const snap = await getDocs(collection(db, colName));
          const deletes = snap.docs.map(d => deleteDoc(doc(db, colName, d.id)));
          await Promise.all(deletes);
        };

        await Promise.all([
          deleteCollection("teams"),
          deleteCollection("clues"),
          deleteCollection("rounds")
        ]);

        btn.textContent = "✓ RESET DONE";
        btn.style.borderColor = "rgba(26,100,26,0.6)";
        btn.style.color = "#7acc7a";
        setTimeout(() => {
          btn.textContent = "⚠ RESET GAME";
          btn.disabled = false;
          btn.style.borderColor = "rgba(139,26,26,0.6)";
          btn.style.color = "rgba(242,232,213,0.7)";
        }, 3000);
      } catch(e) {
        alert("Reset failed: " + e.message);
        btn.textContent = "⚠ RESET GAME";
        btn.disabled = false;
      }
    });

    // ── TABS ──
    document.querySelectorAll(".admin-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".admin-tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".admin-tab-content").forEach(c => c.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
      });
    });

    // ── TEAM COUNT ──
    onSnapshot(collection(db, "teams"), snap => {
      document.getElementById("liveTeamCount").textContent = `${snap.size} team${snap.size !== 1 ? "s" : ""}`;
    });

    // ── ADD CLUE ──
    const addBtn = document.getElementById("addClueBtn");
    const addMsg = document.getElementById("addClueMsg");

    addBtn.addEventListener("click", async () => {
      const title = document.getElementById("clueTitle").value.trim();
      const desc  = document.getElementById("clueDesc").value.trim();
      const round = parseInt(document.getElementById("clueRound").value);

      if (!title || !desc) { showAddMsg("⚠ Title and description required.", "error"); return; }

      const file = document.getElementById("clueMedia").files[0];
      const mediaUrl  = document.getElementById("clueMediaUrl") ? document.getElementById("clueMediaUrl").value.trim() || null : null;
      const mediaType = mediaUrl ? "image" : null;

      let uploadedUrl = null, uploadedType = null;

      if (file) {
        addBtn.textContent = "UPLOADING...";
        document.getElementById("uploadProgress").classList.remove("hidden");
        try {
          const formData = new FormData();
          formData.append("file", file);
          formData.append("upload_preset", "Sherlocked again");
          const res = await fetch("https://api.cloudinary.com/v1_1/duagi0eqn/auto/upload", {
            method: "POST", body: formData
          });
          const data = await res.json();
          if (data.secure_url) {
            uploadedUrl  = data.secure_url;
            uploadedType = file.type.startsWith("audio") ? "audio" : "image";
          } else {
            throw new Error(data.error?.message || "Upload failed");
          }
        } catch(e) {
          showAddMsg("⚠ Upload failed: " + e.message, "error");
          addBtn.disabled = false;
          addBtn.textContent = "SAVE CLUE (DRAFT)";
          document.getElementById("uploadProgress").classList.add("hidden");
          return;
        }
        document.getElementById("uploadProgress").classList.add("hidden");
        addBtn.textContent = "SAVING...";
      }

      addBtn.disabled = true;
      addBtn.textContent = "SAVING...";

      try {
        await addDoc(collection(db, "clues"), {
          title, description: desc, round,
          mediaUrl: uploadedUrl, mediaType: uploadedType,
          released: false,
          createdAt: serverTimestamp()
        });
        showAddMsg("✓ Clue saved as draft.", "success");
        document.getElementById("clueTitle").value = "";
        document.getElementById("clueDesc").value  = "";
        document.getElementById("clueMedia").value = "";
      } catch(e) {
        showAddMsg("⚠ Failed: " + e.message, "error");
      }
      addBtn.disabled = false;
      addBtn.textContent = "SAVE CLUE (DRAFT)";
    });

    function showAddMsg(text, type) {
      addMsg.textContent = text;
      addMsg.className = "submit-msg " + type;
      setTimeout(() => addMsg.className = "submit-msg hidden", 4000);
    }

    // ── CLUE LIST ──
    const adminClueList  = document.getElementById("adminClueList");
    const adminEmpty     = document.getElementById("adminEmpty");
    const adminClueCount = document.getElementById("adminClueCount");

    onSnapshot(query(collection(db, "clues"), orderBy("createdAt", "desc")), snap => {
      const clues = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      adminClueCount.textContent = clues.length;
      adminClueList.querySelectorAll(".admin-clue-item").forEach(c => c.remove());

      if (clues.length === 0) { adminEmpty.style.display = "flex"; return; }
      adminEmpty.style.display = "none";

      clues.forEach(clue => {
        const item = document.createElement("div");
        item.className = "admin-clue-item" + (clue.released ? " released" : "");
        item.innerHTML = `
          <div class="admin-clue-top">
            <span class="clue-round-tag">R${clue.round}</span>
            <span class="admin-clue-title">${escHtml(clue.title)}</span>
            <span class="release-badge ${clue.released ? "live" : "draft"}">${clue.released ? "● LIVE" : "○ DRAFT"}</span>
          </div>
          <div class="admin-clue-desc">${escHtml(clue.description || "")}</div>
          <div class="admin-clue-actions">
            <button class="admin-btn ${clue.released ? "grey" : "pink"} small release-btn" data-id="${clue.id}" data-released="${clue.released}">
              ${clue.released ? "RETRACT" : "RELEASE NOW"}
            </button>
            <button class="admin-btn grey small delete-btn" data-id="${clue.id}">DELETE</button>
          </div>
        `;
        adminClueList.appendChild(item);
      });

      adminClueList.querySelectorAll(".release-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const released = btn.dataset.released === "true";
          await updateDoc(doc(db, "clues", btn.dataset.id), {
            released: !released,
            releasedAt: !released ? serverTimestamp() : null
          });
        });
      });

      adminClueList.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Delete this clue?")) return;
          await updateDoc(doc(db, "clues", btn.dataset.id), { deleted: true, released: false });
        });
      });
    });

    // ── TEAMS LIST ──
    const teamsList  = document.getElementById("teamsList");
    const teamsCount = document.getElementById("teamsCount");

    onSnapshot(collection(db, "teams"), snap => {
      const teams = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      teamsCount.textContent = teams.length;

      if (teams.length === 0) {
        teamsList.innerHTML = '<div class="empty-sub-note">No teams registered yet.</div>'; return;
      }

      teamsList.innerHTML = teams.map(t => `
        <div class="team-card ${t.eliminated ? "eliminated" : ""}">
          <div class="team-card-top">
            <div class="team-card-name">
              ${t.eliminated ? "☠ " : "🔍 "}<strong>${escHtml(t.name)}</strong>
              ${t.eliminated ? '<span class="elim-tag">ELIMINATED</span>' : '<span class="active-tag">ACTIVE</span>'}
            </div>
            <button class="admin-btn small ${t.eliminated ? "pink" : "grey"} elim-btn"
              data-id="${t.id}" data-elim="${t.eliminated}">
              ${t.eliminated ? "REINSTATE" : "ELIMINATE"}
            </button>
          </div>
          <div class="team-card-members">
            ${(t.members || []).map(m => `<span class="member-chip">👤 ${escHtml(m)}</span>`).join("")}
            ${(!t.members || t.members.length === 0) ? '<span style="color:var(--ink-faint);font-size:0.7rem;font-style:italic">No members listed</span>' : ""}
          </div>
          <div class="team-card-time">Registered: ${t.joinedAt?.toDate ? t.joinedAt.toDate().toLocaleString() : "—"}</div>
        </div>
      `).join("");

      teamsList.querySelectorAll(".elim-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const elim = btn.dataset.elim === "true";
          const action = elim ? "reinstate" : "eliminate";
          if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} this team?`)) return;
          await updateDoc(doc(db, "teams", btn.dataset.id), { eliminated: !elim });
        });
      });
    });

    // ── ROUND CONTROLS ──
    const rcList = document.getElementById("roundControlsList");

    async function renderRoundControls() {
      rcList.innerHTML = "";
      for (const r of [1,2,3,4,5]) {
        const snap = await getDoc(doc(db, "rounds", String(r)));
        const locked = snap.exists() ? snap.data().locked : false;
        const row = document.createElement("div");
        row.className = "round-row-ctrl";
        row.innerHTML = `
          <span class="round-label">ROUND ${r}</span>
          <span class="lock-status ${locked ? "locked" : "unlocked"}">${locked ? "🔒 LOCKED" : "🔓 OPEN"}</span>
          <button class="admin-btn small ${locked ? "pink" : "grey"} lock-btn" data-round="${r}" data-locked="${locked}">
            ${locked ? "UNLOCK" : "LOCK"}
          </button>
        `;
        rcList.appendChild(row);
      }
      rcList.querySelectorAll(".lock-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const locked = btn.dataset.locked === "true";
          await setDoc(doc(db, "rounds", btn.dataset.round), { locked: !locked });
          renderRoundControls();
        });
      });
    }
    renderRoundControls();

    function escHtml(s) {
      return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
</body>
</html>
