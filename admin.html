<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHER LOCKED AGAIN?! — Control Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Special+Elite&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/old-london" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="db.js"></script>
</head>
<body class="admin-page">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [activeTab, setActiveTab] = useState("clues");
      const [teams, setTeams] = useState([]);
      const [clues, setClues] = useState([]);
      const [rounds, setRounds] = useState({});
      
      const [clueTitle, setClueTitle] = useState("");
      const [clueDesc, setClueDesc] = useState("");
      const [clueRound, setClueRound] = useState("1");
      const [clueFile, setClueFile] = useState(null);
      
      const fileInputRef = useRef(null);
      const [uploading, setUploading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState(null);
      const [msgType, setMsgType] = useState("");

      const [resetting, setResetting] = useState(false);

      useEffect(() => {
        const updateState = () => {
          const db = window.getDB();
          setTeams(db.teams);
          setClues(db.clues.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)));
          setRounds(db.rounds);
        };
        updateState();
        const unsubscribe = window.subscribeDB(updateState);
        return () => unsubscribe();
      }, []);

      const showMsg = (text, type) => {
        setMsg(text);
        setMsgType(type);
        setTimeout(() => setMsg(null), 4000);
      };

      const handleReset = () => {
        if (!confirm("⚠ RESET GAME?\n\nThis will permanently delete ALL teams, clues, and rounds. This cannot be undone.\n\nType OK to confirm.")) return;
        setResetting(true);
        setTimeout(() => {
          const freshDB = { teams: [], clues: [], rounds: {1: false, 2: false, 3: false, 4: false, 5: false} };
          window.saveDB(freshDB);
          setResetting(false);
        }, 1000);
      };

      const handleAddClue = async () => {
        if (!clueTitle.trim() || !clueDesc.trim()) { showMsg("⚠ Title and description required.", "error"); return; }

        let uploadedUrl = null, uploadedType = null;

        if (clueFile) {
          setUploading(true);
          setSaving(true);
          try {
            const formData = new FormData();
            formData.append("file", clueFile);
            formData.append("upload_preset", "Sherlocked again");
            const res = await fetch("https://api.cloudinary.com/v1_1/duagi0eqn/auto/upload", {
              method: "POST", body: formData
            });
            const data = await res.json();
            if (data.secure_url) {
              uploadedUrl  = data.secure_url;
              uploadedType = clueFile.type.startsWith("audio") ? "audio" : "image";
            } else {
              throw new Error(data.error?.message || "Upload failed");
            }
          } catch(e) {
            showMsg("⚠ Upload failed: " + e.message, "error");
            setUploading(false); setSaving(false);
            return;
          }
          setUploading(false);
        } else {
          setSaving(true);
        }

        const newClue = {
          id: window.generateId(),
          title: clueTitle.trim(),
          description: clueDesc.trim(),
          round: parseInt(clueRound),
          mediaUrl: uploadedUrl,
          mediaType: uploadedType,
          released: false,
          createdAt: new Date().toISOString()
        };

        const db = window.getDB();
        db.clues.push(newClue);
        window.saveDB(db);

        showMsg("✓ Clue saved as draft.", "success");
        setClueTitle(""); setClueDesc(""); setClueRound("1"); setClueFile(null);
        if (fileInputRef.current) fileInputRef.current.value = "";
        setSaving(false);
      };

      const handleReleaseClue = (id, currentlyReleased) => {
        const db = window.getDB();
        const clue = db.clues.find(c => c.id === id);
        if (clue) {
          clue.released = !currentlyReleased;
          clue.releasedAt = !currentlyReleased ? new Date().toISOString() : null;
          window.saveDB(db);
        }
      };

      const handleDeleteClue = (id) => {
        if (!confirm("Delete this clue?")) return;
        const db = window.getDB();
        db.clues = db.clues.filter(c => c.id !== id);
        window.saveDB(db);
      };

      const handleEliminateTeam = (id, currentlyEliminated) => {
        const action = currentlyEliminated ? "reinstate" : "eliminate";
        if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} this team?`)) return;
        const db = window.getDB();
        const team = db.teams.find(t => t.id === id);
        if (team) {
          team.eliminated = !currentlyEliminated;
          window.saveDB(db);
        }
      };

      const handleToggleRound = (r, currentlyLocked) => {
        const db = window.getDB();
        db.rounds[r] = !currentlyLocked;
        window.saveDB(db);
      };

      return (
        <React.Fragment>
          <div className="paper-texture"></div>
          <div className="vignette"></div>

          <header className="admin-header">
            <div className="header-left">
              <span className="logo-sm">SHER LOCKED</span>
              <span className="header-sep">|</span>
              <span className="admin-badge">⚙ INSPECTOR'S CONTROL ROOM</span>
            </div>
            <div className="header-right">
              <span className="live-indicator"></span>
              <span>{teams.length} team{teams.length !== 1 ? "s" : ""}</span>
              <button 
                disabled={resetting}
                onClick={handleReset}
                style={{
                  background:'none', border:'1px solid rgba(139,26,26,0.6)', color: resetting ? '#7acc7a' : 'rgba(242,232,213,0.7)',
                  fontFamily:'var(--font-type)', fontSize:'0.58rem', letterSpacing:'0.12em', padding:'0.3rem 0.8rem', cursor:'pointer'
                }}
              >
                {resetting ? "RESETTING..." : "⚠ RESET GAME"}
              </button>
            </div>
          </header>

          <div className="admin-tabs">
            <button className={`admin-tab ${activeTab === 'clues' ? 'active' : ''}`} onClick={() => setActiveTab('clues')}>📁 CLUES</button>
            <button className={`admin-tab ${activeTab === 'teams' ? 'active' : ''}`} onClick={() => setActiveTab('teams')}>👥 TEAMS</button>
            <button className={`admin-tab ${activeTab === 'rounds' ? 'active' : ''}`} onClick={() => setActiveTab('rounds')}>🔐 ROUNDS</button>
          </div>

          {activeTab === 'clues' && (
            <div className="admin-tab-content active">
              <div className="admin-layout">
                <div className="admin-left">
                  <div className="admin-card">
                    <div className="admin-card-title">＋ NEW CLUE</div>
                    <label className="field-label">TITLE</label>
                    <input type="text" className="admin-input" placeholder="e.g. Suspect's Diary Entry" value={clueTitle} onChange={e=>setClueTitle(e.target.value)} />

                    <label className="field-label" style={{marginTop:'0.8rem'}}>DESCRIPTION</label>
                    <textarea className="admin-textarea" rows="4" placeholder="Describe the clue..." value={clueDesc} onChange={e=>setClueDesc(e.target.value)}></textarea>

                    <div className="two-col" style={{marginTop:'0.8rem'}}>
                      <div>
                        <label className="field-label">ROUND</label>
                        <select className="round-select" value={clueRound} onChange={e=>setClueRound(e.target.value)}>
                          <option>1</option><option>2</option><option>3</option>
                          <option>4</option><option>5</option>
                        </select>
                      </div>
                      <div>
                        <label className="field-label">IMAGE / AUDIO <span style={{color:'var(--ink-faint)',fontSize:'0.55rem'}}>(free upload)</span></label>
                        <input type="file" ref={fileInputRef} className="admin-file" accept="image/*,audio/*" style={{marginTop:'0.3rem'}} onChange={e=>setClueFile(e.target.files[0])} />
                        {uploading && <div style={{marginTop:'0.4rem',fontFamily:'var(--font-type)',fontSize:'0.6rem',color:'var(--ink-faint)'}}>⏳ Uploading...</div>}
                      </div>
                    </div>

                    <button className="admin-btn pink" style={{marginTop:'1rem'}} onClick={handleAddClue} disabled={saving}>
                      {saving ? (uploading ? "UPLOADING..." : "SAVING...") : "SAVE CLUE (DRAFT)"}
                    </button>
                    {msg && <div className={`submit-msg ${msgType}`}>{msg}</div>}
                  </div>
                </div>

                <div className="admin-center">
                  <div className="section-title">
                    <span className="section-icon">📁</span> ALL CLUES
                    <span className="clue-count">{clues.length}</span>
                  </div>
                  <div className="admin-clue-list">
                    {clues.length === 0 ? (
                      <div className="empty-state">
                        <div className="empty-icon">📋</div>
                        <div>No clues yet.</div>
                      </div>
                    ) : (
                      clues.map(clue => (
                        <div className={`admin-clue-item ${clue.released ? "released" : ""}`} key={clue.id}>
                          <div className="admin-clue-top">
                            <span className="clue-round-tag">R{clue.round}</span>
                            <span className="admin-clue-title">{clue.title}</span>
                            <span className={`release-badge ${clue.released ? "live" : "draft"}`}>{clue.released ? "● LIVE" : "○ DRAFT"}</span>
                          </div>
                          <div className="admin-clue-desc">{clue.description}</div>
                          <div className="admin-clue-actions">
                            <button className={`admin-btn ${clue.released ? "grey" : "pink"} small`} onClick={() => handleReleaseClue(clue.id, clue.released)}>
                              {clue.released ? "RETRACT" : "RELEASE NOW"}
                            </button>
                            <button className="admin-btn grey small delete-btn" onClick={() => handleDeleteClue(clue.id)}>DELETE</button>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {activeTab === 'teams' && (
            <div className="admin-tab-content active">
              <div className="teams-panel">
                <div className="section-title">
                  <span className="section-icon">👥</span> REGISTERED TEAMS
                  <span className="clue-count">{teams.length}</span>
                </div>
                <div className="teams-list">
                  {teams.length === 0 ? (
                    <div className="empty-sub-note">No teams registered yet.</div>
                  ) : (
                    teams.map(t => (
                      <div className={`team-card ${t.eliminated ? "eliminated" : ""}`} key={t.id}>
                        <div className="team-card-top">
                          <div className="team-card-name">
                            {t.eliminated ? "☠ " : "🔍 "}<strong>{t.name}</strong>
                            {t.eliminated ? <span className="elim-tag">ELIMINATED</span> : <span className="active-tag">ACTIVE</span>}
                          </div>
                          <button className={`admin-btn small ${t.eliminated ? "pink" : "grey"}`} onClick={() => handleEliminateTeam(t.id, t.eliminated)}>
                            {t.eliminated ? "REINSTATE" : "ELIMINATE"}
                          </button>
                        </div>
                        <div className="team-card-members">
                          {(t.members || []).map((m, i) => <span className="member-chip" key={i}>👤 {m}</span>)}
                          {(!t.members || t.members.length === 0) && <span style={{color:'var(--ink-faint)',fontSize:'0.7rem',fontStyle:'italic'}}>No members listed</span>}
                        </div>
                        <div className="team-card-time">Registered: {t.joinedAt ? new Date(t.joinedAt).toLocaleString() : "—"}</div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          {activeTab === 'rounds' && (
            <div className="admin-tab-content active">
              <div className="rounds-panel">
                <div className="section-title">
                  <span className="section-icon">🔐</span> ROUND CONTROLS
                </div>
                <div className="round-controls-list">
                  {[1,2,3,4,5].map(r => (
                    <div className="round-row-ctrl" key={r}>
                      <span className="round-label">ROUND {r}</span>
                      <span className={`lock-status ${rounds[r] ? "locked" : "unlocked"}`}>{rounds[r] ? "🔒 LOCKED" : "🔓 OPEN"}</span>
                      <button className={`admin-btn small ${rounds[r] ? "pink" : "grey"}`} onClick={() => handleToggleRound(r, rounds[r])}>
                        {rounds[r] ? "UNLOCK" : "LOCK"}
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
