<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHER LOCKED AGAIN?! — Live Detective Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Special+Elite&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/old-london" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="db.js"></script>
</head>
<body class="entry-page">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [step, setStep] = useState(1);
      const [teamName, setTeamName] = useState("");
      const [members, setMembers] = useState([]);
      const [memberInput, setMemberInput] = useState("");
      
      const [errorMsg1, setErrorMsg1] = useState(null);
      const [loading1, setLoading1] = useState(false);
      
      const [errorMsg2, setErrorMsg2] = useState(null);
      const [loading2, setLoading2] = useState(false);

      useEffect(() => {
        if (localStorage.getItem("noir_team")) {
          window.location.href = "feed.html";
        }
      }, []);

      const handleStep1 = () => {
        const name = teamName.trim();
        if (!name) return;
        
        setErrorMsg1(null);
        setLoading1(true);
        
        setTimeout(() => {
          const db = window.getDB();
          const exists = db.teams.find(t => t.name.toLowerCase() === name.toLowerCase());
          if (exists) {
            setErrorMsg1("⚠ That codename is already taken. Choose another.");
            setLoading1(false);
          } else {
            setStep(2);
            setLoading1(false);
          }
        }, 500);
      };

      const handleAddMember = () => {
        const name = memberInput.trim();
        setErrorMsg2(null);
        if (!name) { setErrorMsg2("⚠ Enter a name first."); return; }
        if (members.length >= 6) { setErrorMsg2("⚠ Max 6 members."); return; }
        setMembers([...members, name]);
        setMemberInput("");
      };

      const handleRemoveMember = (indexToRemove) => {
        setMembers(members.filter((_, i) => i !== indexToRemove));
      };

      const handleStep2 = () => {
        if (members.length === 0) {
          setErrorMsg2("⚠ Add at least one member.");
          return;
        }
        setLoading2(true);
        setErrorMsg2(null);

        setTimeout(() => {
          const db = window.getDB();
          db.teams.push({
            id: window.generateId(),
            name: teamName.trim(),
            members: members,
            eliminated: false,
            joinedAt: new Date().toISOString()
          });
          window.saveDB(db);

          localStorage.setItem("noir_team", teamName.trim());
          localStorage.setItem("noir_members", JSON.stringify(members));
          window.location.href = "feed.html";
        }, 500);
      };

      return (
        <React.Fragment>
          <div className="paper-texture"></div>
          <div className="vignette"></div>

          <div className="entry-container">
            <div className="newspaper-header">
              <div className="paper-rule thick"></div>
              <div className="masthead-row">
                <div className="masthead-left">
                  <div className="edition-text">MORNING EDITION</div>
                  <div className="edition-text">VOL. CLXII . No. 47</div>
                </div>
                <div className="masthead-center">
                  <div className="paper-name">The Baker Street</div>
                  <div className="paper-sub">INTELLIGENCE GAZETTE</div>
                </div>
                <div className="masthead-right">
                  <div className="edition-text">APRIL 8, 2026</div>
                  <div className="edition-text">PRICE: YOUR WITS</div>
                </div>
              </div>
              <div className="paper-rule thick"></div>
              <div className="paper-rule thin"></div>
            </div>

            <div className="headline-block">
              <div className="headline-kicker">◆ BREAKING CASE ◆</div>
              <div className="headline-main">SHER LOCKED</div>
              <div className="headline-again">AGAIN?!</div>
              <div className="headline-deck">A Timeless Hunt Begins — Detectives Summoned to Solve the Unsolvable</div>
            </div>

            <div className="paper-rule thin"></div>

            <div className="entry-columns">
              <div className="entry-story">
                <p><span className="drop-cap">A</span>call comes in—another body, another case.
But this one feels different.
The victim is identified as Clara Hale, daughter of a powerful man who kept her hidden from the world.</p>
                <p>No photos. No public life. No real identity.</p>
                <p>The evidence seems clear… almost too clear.
And somewhere between what is seen and what is believed—
something doesn’t add up</p>
                <div className="wanted-box">
                  <div className="wanted-title">ATTENTION, DETECTIVE</div>
                  <div className="wanted-sub">Register your investigative unit to gain access to classified case files.</div>
                </div>
              </div>

              <div className="entry-form-col">
                {step === 1 && (
                  <div className="entry-card">
                    <div className="card-header">
                      <span className="live-indicator"></span>
                      STEP 1 — UNIT IDENTIFICATION
                    </div>
                    <div className="card-body">
                      <label className="field-label" htmlFor="teamName">TEAM CODENAME</label>
                      <input 
                        type="text" 
                        id="teamName" 
                        className="team-input" 
                        placeholder="Enter your team name..." 
                        maxLength="30" 
                        autoComplete="off"
                        value={teamName}
                        onChange={(e) => setTeamName(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && handleStep1()}
                      />
                      {errorMsg1 && <div className="error-msg">{(errorMsg1)}</div>}
                      <button className="enter-btn" onClick={handleStep1} disabled={loading1}>
                        {!loading1 ? <span>NEXT — ADD MEMBERS &rarr;</span> : <span>CHECKING...</span>}
                      </button>
                    </div>
                    <div className="card-footer">All transmissions are recorded by the Gazette.</div>
                  </div>
                )}

                {step === 2 && (
                  <div className="entry-card">
                    <div className="card-header">
                      <span className="live-indicator"></span>
                      STEP 2 — REGISTER MEMBERS
                      <button style={{marginLeft:'auto',background:'none',border:'1px solid rgba(242,232,213,0.3)',color:'rgba(242,232,213,0.6)',fontFamily:'var(--font-type)',fontSize:'0.58rem',letterSpacing:'0.1em',padding:'0.2rem 0.6rem',cursor:'pointer'}}
                        onClick={() => { setStep(1); setErrorMsg1(null); }}
                      >&larr; BACK</button>
                    </div>
                    <div className="card-body">
                      <div className="team-name-display">Team: {teamName}</div>
                      <label className="field-label">MEMBER NAMES <span style={{color:'var(--ink-faint)'}}>(add up to 6)</span></label>
                      <div className="members-list">
                        {members.map((m, i) => (
                          <div className="member-tag" key={i}>
                            <span>👤 {m}</span>
                            <button className="remove-member" onClick={() => handleRemoveMember(i)}>✕</button>
                          </div>
                        ))}
                      </div>
                      <div className="member-add-row">
                        <input 
                          type="text" 
                          className="team-input" 
                          placeholder="Member name..." 
                          maxLength="30" 
                          autoComplete="off"
                          value={memberInput}
                          onChange={(e) => setMemberInput(e.target.value)}
                          onKeyDown={(e) => e.key === 'Enter' && handleAddMember()}
                        />
                        <button className="add-member-btn" onClick={handleAddMember}>＋</button>
                      </div>
                      {errorMsg2 && <div className="error-msg">{errorMsg2}</div>}
                      <button className="enter-btn" style={{marginTop:'0.75rem'}} onClick={handleStep2} disabled={loading2}>
                        {!loading2 ? <span>ENTER THE INVESTIGATION &rarr;</span> : <span>REGISTERING...</span>}
                      </button>
                    </div>
                    <div className="card-footer">You can add up to 6 members per team.</div>
                  </div>
                )}
              </div>
            </div>

            <div className="paper-rule thin"></div>
            <div className="bottom-note">
              INSPECTOR? <a href="admin.html" className="admin-link">&rarr; Enter Control Room</a>
            </div>

          </div>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
